formatter: markdown table
version: ""
recursive:
  enabled: false
  path: .
sections:
  hide: []
  show:
    - requirements
    - providers
    - modules
    - resources
    - inputs
    - outputs
sort:
  enabled: true
  by: name
content: |-
  ## Terraform Reference

  {{ .Requirements }}

  {{ .Providers }}

  {{ .Modules }}

  {{ .Resources }}

  {{ .Inputs }}

  {{ .Outputs }}
output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->
settings:
  anchor: false
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: false
  required: true
  sensitive: true
  type: true